name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      database:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -d app -U app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DATABASE_URL: postgresql://app:app@localhost:5432/app?serverVersion=16&charset=utf8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, intl, ctype, iconv
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --no-scripts

      - name: Lint YAML config
        run: php bin/console lint:yaml config --parse-tags

      - name: Lint Twig templates
        run: php bin/console lint:twig templates

      - name: Lint container
        run: php bin/console lint:container

      - name: Create test database
        run: php bin/console doctrine:database:create --if-not-exists

      - name: Run database migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: PHPUnit
        run: vendor/bin/phpunit
